version: '3.8'

services:
  # Основная база данных для всей экосистемы
  postgres:
    image: postgres:16-alpine
    container_name: void-postgres
    restart: always
    environment:
      POSTGRES_USER: void_admin
      POSTGRES_PASSWORD: void_password
      POSTGRES_DB: void_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Сюда мы положим скрипт инициализации таблиц
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  # Кэш и очереди для SSO
  redis:
    image: redis:7-alpine
    container_name: void-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
